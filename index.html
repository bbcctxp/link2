<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fumiko Poko - Welcome to my shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Slackey&display=swap" rel="stylesheet">
    <style>
        :root {
            /* เปลี่ยนเป็นโทนม่วงพาสเทลตามสั่ง */
            --color-pink-bg: #f3eeff;
            --color-pink-dot: #ffffff;
            --color-pink-dark: #b194ff;
            --color-pink-light: #d8ccff;
            --color-brown-dark: #3d2b52;
            --color-brown-light: #63507a;
        }

        body {
            font-family: 'Mitr', sans-serif;
            background-color: var(--color-pink-bg);
            background-image: radial-gradient(var(--color-pink-dot) 15%, transparent 16%), radial-gradient(var(--color-pink-dot) 15%, transparent 16%);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--color-brown-dark);
            scroll-behavior: smooth;
        }

        .font-slackey {
            font-family: 'Slackey', 'Mitr', cursive;
        }

        .text-shadow-cute {
            text-shadow: 2px 2px 0px #fff, 3px 3px 0px var(--color-pink-light);
        }

        .clean-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(177, 148, 255, 0.15);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-pink-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-pink-dark); border-radius: 10px; }

        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        .modal-exit { animation: modalFadeOut 0.2s ease-in forwards; }
        
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes modalFadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }

        .slider-track { display: flex; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; }
    </style>
</head>

<body class="min-h-screen pb-12">
